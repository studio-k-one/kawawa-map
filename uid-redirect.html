<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メンバー登録へ進む</title>
<style>
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:#FBF3E6;
    color:#3a342c;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    text-align:center;
    padding:24px;
  }
  .box{ max-width:320px; }
  .spinner{
    width:40px;height:40px;border:4px solid #eee;border-top:4px solid #EF9F27;
    border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  p{ font-size:15px; line-height:1.6; }
  .error{ color:#c0392b; display:none; }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <p id="msg">読み込み中です。少々お待ちください…</p>
    <p class="error" id="errorMsg">エラーが発生しました。LINEアプリ内のリンクから開き直してください。</p>
  </div>

  <!--
    ============================================
    設定方法（公開前に下記2点を書き換えてください）
    ============================================

    ① LIFF_ID
      LINE Developers Console →
      LINEミニアプリチャネルを新規作成 → 発行されたLIFF ID（例: 1234567890-AbCdEfGh）に置き換える

    ② ENTRY_ID
      Googleフォームの編集画面で、UIDを受け取る記述式の項目を1つ用意する。
      （タイトルは目立たない名前でよい。例：「整理番号」「管理用コード」。説明文に「※自動入力されます。変更しないでください」）

      entry IDの取得方法（「事前入力したURLを取得」が見つからない場合）：
      ・このメニューは“質問カードの中の⋮”ではなく、編集画面いちばん上、
        プレビュー（目のアイコン）やテーマ（パレットのアイコン）と同じ行にある“⋮（その他）”にある。
        どの質問も選択していない状態（画面の余白をクリックしてから）で開くこと。

      ・それでも見つからない場合は直接調べる：
        1. 公開済みフォームのURL（…/viewform）を開く
        2. F12（開発者ツール）→ Ctrl+F検索で該当の質問タイトルを検索
        3. 質問タイトルの近くにある数字（entry.1234567890 など）がentry ID
  -->

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // ① ミニアプリ作成後に発行されるLIFF IDに置き換える
    var LIFF_ID = "2010483327-GZNVw9Hh";

    // GoogleフォームのベースURL（指定いただいたフォーム）
    var FORM_BASE = "https://docs.google.com/forms/d/e/1FAIpQLSe8MPAZtTHrbSrK6F3-6mU2f0oKP8yrGqebcDxQIVm0VM78Qw/viewform";

    // ② フォーム側でUIDを受け取る項目のentry IDに置き換える（手順は上記コメント参照）
    var ENTRY_ID = "entry.1099614447";

    function showError(err) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("msg").style.display = "none";
      document.getElementById("errorMsg").style.display = "block";
      if (err) { console.error(err); }
    }

    if (typeof liff === "undefined") {
      showError("LIFF SDKの読み込みに失敗しました");
    } else {
      liff.init({ liffId: LIFF_ID })
        .then(function () {
          if (!liff.isLoggedIn()) {
            liff.login();
            return Promise.reject("ログイン画面に遷移します");
          }
          return liff.getProfile();
        })
        .then(function (profile) {
          var uid = profile.userId;
          var url = FORM_BASE + "?usp=pp_url&" + ENTRY_ID + "=" + encodeURIComponent(uid);
          location.href = url;
        })
        .catch(function (err) {
          // login()へのリダイレクト中もここに来るが、その場合はエラー表示しない
          if (err !== "ログイン画面に遷移します") {
            showError(err);
          }
        });
    }
  </script>
</body>
</html>
