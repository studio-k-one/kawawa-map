<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会館予約</title>
  <style>
    :root{
      --cream:#FBF3E6;
      --orange:#EF9F27;
      --orange-dark:#C97A12;
      --green:#3FA66B;
      --green-dark:#2C7C4F;
      --blue:#4A90D9;
      --blue-dark:#2E6CAE;
      --brown:#5B4636;
      --ink:#3a342c;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; }

    header {
      background:var(--green); color:white;
      padding:24px 16px; text-align:center;
    }
    header h1 { font-size:22px; font-weight:800; }
    header p  { font-size:13px; opacity:.92; margin-top:4px; }

    .wrapper { max-width:860px; margin:0 auto; }
    .content { padding:24px 20px; display:flex; flex-direction:column; gap:18px; }

    .card {
      background:white; border-radius:16px;
      box-shadow:0 4px 14px rgba(0,0,0,.06);
      overflow:hidden;
    }
    .card-head {
      background:var(--green); color:white;
      padding:13px 18px; font-size:15px; font-weight:700;
      display:flex; align-items:center; gap:8px;
    }
    .card-body { padding:16px 18px; }
    .card-body p { font-size:14px; color:#544a3d; line-height:1.8; margin-bottom:10px; }
    .card-body p:last-child { margin-bottom:0; }

    /* カレンダー */
    .cal-nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 4px 14px;
    }
    .cal-nav button {
      background:#E8F5ED; border:none; border-radius:10px;
      width:36px; height:36px; font-size:16px; color:var(--green-dark);
      cursor:pointer;
    }
    .cal-nav button:hover { background:#d3ecdd; }
    .cal-nav .ym { font-size:16px; font-weight:700; color:var(--ink); }

    .cal-grid {
      display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
    }
    .cal-dow {
      text-align:center; font-size:12px; color:#9a8a72; font-weight:700; padding-bottom:4px;
    }
    .cal-dow.sun { color:#d56a6a; }
    .cal-dow.sat { color:var(--blue-dark); }

    .cal-day {
      aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;
      border-radius:10px; font-size:14px; cursor:pointer; color:var(--ink);
      background:#F7F2E8; user-select:none;
    }
    .cal-day.blank { background:transparent; cursor:default; }
    .cal-day.sun { color:#d56a6a; }
    .cal-day.sat { color:var(--blue-dark); }
    .cal-day.past { color:#c9bfae; background:#F1ECE0; cursor:not-allowed; }
    .cal-day:not(.blank):not(.past):hover { background:#d3ecdd; }
    .cal-day.selected { background:var(--green); color:white; font-weight:800; }

    /* 時間帯 */
    .slot-list { display:flex; flex-direction:column; gap:10px; }
    .slot {
      display:flex; align-items:center; justify-content:space-between;
      background:#F7F2E8; border:2px solid transparent; border-radius:12px;
      padding:14px 16px; cursor:pointer;
    }
    .slot:hover { background:#EFE7D6; }
    .slot .label { font-size:14.5px; font-weight:700; color:var(--ink); }
    .slot .time  { font-size:12.5px; color:#8a7a64; margin-top:2px; }
    .slot .mark  { font-size:18px; color:#cfc6b4; }
    .slot.selected { background:#E8F5ED; border-color:var(--green); }
    .slot.selected .mark { color:var(--green); }
    .slot.selected .label { color:var(--green-dark); }

    /* 確認エリア */
    .summary {
      background:#FBF3E6; border:2px dashed #e6d8bd; border-radius:12px;
      padding:14px 16px; font-size:13.5px; color:#6b5d49; line-height:1.8;
    }
    .summary b { color:var(--ink); }
    .summary .empty { color:#a39782; }

    .btn-confirm {
      display:block; width:100%; text-align:center;
      background:var(--orange); color:white; border:none;
      border-radius:14px; padding:16px; font-size:16px; font-weight:800;
      box-shadow:0 4px 10px rgba(239,159,39,.35); cursor:pointer;
    }
    .btn-confirm:disabled { background:#e3d6bd; box-shadow:none; cursor:not-allowed; color:#a39782; }

    .done-box {
      display:none; background:#E8F5ED; border-radius:14px; padding:20px 18px;
      text-align:center;
    }
    .done-box.show { display:block; }
    .done-box .check { font-size:34px; margin-bottom:8px; }
    .done-box .ttl { font-size:15.5px; font-weight:800; color:var(--green-dark); margin-bottom:6px; }
    .done-box .detail { font-size:13.5px; color:#3a342c; line-height:1.8; }
    .done-box .note { font-size:12px; color:#7a8a76; margin-top:10px; }

    .note {
      background:#EFE6E0; border-left:4px solid var(--brown);
      border-radius:0 10px 10px 0; padding:12px 16px;
      font-size:13px; color:var(--brown); line-height:1.8;
    }
    .note b { color:#3a2c20; }

    .related { border-top:2px solid #efe3cf; padding:14px 20px; background:#F7EEDD; }
    .related h3 { font-size:12px; color:#9a8a72; margin-bottom:8px; }
    .related-links { display:flex; gap:10px; flex-wrap:wrap; }
    .rel-btn {
      flex:1; min-width:140px; display:flex; align-items:center; justify-content:center; gap:6px;
      border:1.5px solid #e6d8bd; border-radius:10px; padding:10px 12px;
      font-size:13px; font-weight:700; text-decoration:none; color:var(--ink); background:white;
    }
    .rel-btn:hover { background:#E8F5ED; border-color:var(--green); }

    footer {
      text-align:center; font-size:12px; color:#f4ead8;
      padding:18px 20px; background:var(--brown);
    }
    footer a { color:#BBD8F2; }
  </style>
</head>
<body>

<header>
  <h1>🏛️ 会館予約</h1>
  <p>自治会館の利用日時を選んでください</p>
</header>

<div class="wrapper"><div class="content">

  <div class="card">
    <div class="card-head">📅 利用日を選ぶ</div>
    <div class="card-body">
      <div class="cal-nav">
        <button id="prevMonth" aria-label="前の月">‹</button>
        <span class="ym" id="ymLabel"></span>
        <button id="nextMonth" aria-label="次の月">›</button>
      </div>
      <div class="cal-grid" id="dowRow"></div>
      <div class="cal-grid" id="dayGrid" style="margin-top:6px;"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">⏰ 利用時間帯を選ぶ</div>
    <div class="card-body">
      <div class="slot-list">
        <div class="slot" data-slot="午前" data-time="9:00〜13:00">
          <div><div class="label">午前</div><div class="time">9:00 〜 13:00</div></div>
          <div class="mark">○</div>
        </div>
        <div class="slot" data-slot="午後" data-time="13:00〜17:00">
          <div><div class="label">午後</div><div class="time">13:00 〜 17:00</div></div>
          <div class="mark">○</div>
        </div>
        <div class="slot" data-slot="夜間" data-time="17:00〜21:00">
          <div><div class="label">夜間</div><div class="time">17:00 〜 21:00</div></div>
          <div class="mark">○</div>
        </div>
      </div>
    </div>
  </div>

  <div class="summary" id="summaryBox">
    <span class="empty">日付と時間帯を選ぶと、ここに予約内容が表示されます。</span>
  </div>

  <button class="btn-confirm" id="confirmBtn" disabled>この内容で予約する</button>

  <div class="done-box" id="doneBox">
    <div class="check">✅</div>
    <div class="ttl">ご予約内容を確認しました</div>
    <div class="detail" id="doneDetail"></div>
    <div class="note">※現在は表示確認用のページです。実際の予約受付は準備中です。</div>
  </div>

  <div class="note">
    ⚠️ <b>当日のご利用は、事前に役員へ直接ご連絡ください。</b><br>
    予約の重複が確認された場合は、後ほど担当者よりご連絡いたします。
  </div>

</div></div>

<div class="wrapper related">
  <h3>🔗 関連ページ</h3>
  <div class="related-links">
    <a href="hazard-map.html?openExternalBrowser=1" class="rel-btn">🗺️ 防災マップ</a>
    <a href="disaster-info.html?openExternalBrowser=1" class="rel-btn">🚨 災害情報の見方</a>
  </div>
</div>

<footer class="wrapper">
  〇〇自治会　会館予約のご案内
</footer>

<script>
  const dowNames = ['日','月','火','水','木','金','土'];
  const dowRow = document.getElementById('dowRow');
  dowNames.forEach((d,i)=>{
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i===0?' sun':i===6?' sat':'');
    el.textContent = d;
    dowRow.appendChild(el);
  });

  const today = new Date();
  today.setHours(0,0,0,0);
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth(); // 0-11
  let selectedDate = null; // Date object
  let selectedSlot = null; // {slot,time}

  const ymLabel = document.getElementById('ymLabel');
  const dayGrid = document.getElementById('dayGrid');
  const summaryBox = document.getElementById('summaryBox');
  const confirmBtn = document.getElementById('confirmBtn');
  const doneBox = document.getElementById('doneBox');
  const doneDetail = document.getElementById('doneDetail');

  function renderCalendar(){
    dayGrid.innerHTML = '';
    ymLabel.textContent = `${viewYear}年 ${viewMonth+1}月`;

    const firstDow = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

    for(let i=0;i<firstDow;i++){
      const blank = document.createElement('div');
      blank.className = 'cal-day blank';
      dayGrid.appendChild(blank);
    }

    for(let d=1; d<=daysInMonth; d++){
      const cellDate = new Date(viewYear, viewMonth, d);
      cellDate.setHours(0,0,0,0);
      const dow = cellDate.getDay();
      const cell = document.createElement('div');
      cell.className = 'cal-day' + (dow===0?' sun':dow===6?' sat':'');
      cell.textContent = d;

      if(cellDate < today){
        cell.classList.add('past');
      } else {
        cell.addEventListener('click', ()=>{
          selectedDate = cellDate;
          renderCalendar();
          updateSummary();
        });
      }

      if(selectedDate && cellDate.getTime() === selectedDate.getTime()){
        cell.classList.add('selected');
      }

      dayGrid.appendChild(cell);
    }
  }

  document.getElementById('prevMonth').addEventListener('click', ()=>{
    viewMonth--;
    if(viewMonth<0){ viewMonth=11; viewYear--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', ()=>{
    viewMonth++;
    if(viewMonth>11){ viewMonth=0; viewYear++; }
    renderCalendar();
  });

  document.querySelectorAll('.slot').forEach(slotEl=>{
    slotEl.addEventListener('click', ()=>{
      document.querySelectorAll('.slot').forEach(s=>s.classList.remove('selected'));
      slotEl.classList.add('selected');
      selectedSlot = { slot: slotEl.dataset.slot, time: slotEl.dataset.time };
      updateSummary();
    });
  });

  function formatDate(dt){
    const w = dowNames[dt.getDay()];
    return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${w}）`;
  }

  function updateSummary(){
    if(selectedDate && selectedSlot){
      summaryBox.innerHTML = `予約内容：<b>${formatDate(selectedDate)}　${selectedSlot.slot}（${selectedSlot.time}）</b>`;
      confirmBtn.disabled = false;
    } else if(selectedDate){
      summaryBox.innerHTML = `<b>${formatDate(selectedDate)}</b> を選択中。次に時間帯を選んでください。`;
      confirmBtn.disabled = true;
    } else if(selectedSlot){
      summaryBox.innerHTML = `<b>${selectedSlot.slot}（${selectedSlot.time}）</b> を選択中。次に日付を選んでください。`;
      confirmBtn.disabled = true;
    } else {
      summaryBox.innerHTML = `<span class="empty">日付と時間帯を選ぶと、ここに予約内容が表示されます。</span>`;
      confirmBtn.disabled = true;
    }
  }

  confirmBtn.addEventListener('click', ()=>{
    if(!selectedDate || !selectedSlot) return;
    doneDetail.textContent = `${formatDate(selectedDate)}　${selectedSlot.slot}（${selectedSlot.time}）`;
    doneBox.classList.add('show');
    doneBox.scrollIntoView({ behavior:'smooth', block:'center' });
  });

  renderCalendar();
</script>

</body>
</html>
